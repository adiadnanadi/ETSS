<!DOCTYPE html>
<html lang="bs">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KvizMajstor — Učenik</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <style>
    .pg   { padding:28px 0 60px; }
    .qg   { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; }
    .qcard { display:flex; flex-direction:column; gap:11px; transition:transform var(--t),box-shadow var(--t); }
    .qcard:hover { transform:translateY(-2px); box-shadow:var(--shadow); }
    .qcard-subj  { font-size:11px; font-weight:700; color:var(--accent); text-transform:uppercase; letter-spacing:.06em; }
    .qcard-title { font-family:var(--fd); font-size:16px; font-weight:600; line-height:1.3; }
    .qcard-desc  { font-size:13px; color:var(--text2); line-height:1.5; flex:1; }
    .qcard-meta  { display:flex; gap:12px; font-size:12px; color:var(--text3); }
    .locked-bar  { display:flex; align-items:center; gap:8px; background:var(--bg3); border:1px solid var(--border); border-radius:var(--r); padding:10px 14px; font-size:13px; color:var(--text3); }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="wrap">
      <a class="nb-brand" href="/student"><span class="nb-logo">📚</span><span class="nb-title">KvizMajstor</span></a>
      <div class="nb-right">
        <span class="badge badge-blue">🎓 Učenik</span>
        <span class="nb-user" id="nb-email"></span>
        <button class="btn btn-ghost btn-sm" id="logout-btn">Odjava</button>
      </div>
    </div>
  </nav>

  <div class="wrap pg">
    <div style="margin-bottom:22px">
      <h1 style="font-family:var(--fd);font-size:26px;font-weight:700;letter-spacing:-.02em;margin-bottom:3px">Zdravo! 👋</h1>
      <p style="font-size:13.5px;color:var(--text2)" id="greeting-sub">Učitavanje...</p>
    </div>

    <div class="stats-grid">
      <div class="stat-card"><div class="stat-v" id="s-avail"  style="color:var(--accent)">—</div><div class="stat-l">Dostupnih kvizova</div></div>
      <div class="stat-card"><div class="stat-v" id="s-done"   style="color:var(--green)">—</div><div class="stat-l">Riješenih</div></div>
      <div class="stat-card"><div class="stat-v" id="s-avg"    style="color:var(--amber)">—</div><div class="stat-l">Prosječan rezultat</div></div>
      <div class="stat-card"><div class="stat-v" id="s-best"   style="color:var(--purple)">—</div><div class="stat-l">Najbolja ocjena</div></div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="quizzes">📝 Dostupni kvizovi</button>
      <button class="tab" data-tab="my-results">📊 Moji rezultati</button>
    </div>

    <div id="tab-quizzes">
      <div class="qg" id="quizzes-grid"><p style="color:var(--text3)">Učitavanje...</p></div>
    </div>

    <div id="tab-my-results" style="display:none">
      <div class="card">
        <div class="sec-title">Moji rezultati</div>
        <div style="overflow-x:auto" id="my-results-wrap"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth, db } from '/js/firebase-config.js';
    import { onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import { collection, getDocs, doc, getDoc, query, where } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
    import { toast, gradeBadge, fmtDate, pctColor } from '/js/utils.js';

    let myResults=[], uid=null, userData=null;

    onAuthStateChanged(auth, async (u) => {
      if (!u) { window.location.href='/login'; return; }
      if (!u.emailVerified) { await signOut(auth); window.location.href='/login'; return; }
      uid = u.uid;
      document.getElementById('nb-email').textContent = u.email;
      const snap = await getDoc(doc(db,'users',u.uid));
      userData = snap.data();
      if (userData?.role==='admin') { window.location.href='/admin'; return; }
      document.getElementById('greeting-sub').textContent =
        `${userData?.displayName||u.email.split('@')[0]} · Razred: ${userData?.razred||'—'} · ${userData?.smjer||''}`;
      await loadData();
    });

    document.getElementById('logout-btn').onclick = () => signOut(auth).then(()=>window.location.href='/login');

    document.querySelectorAll('.tab').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-quizzes').style.display    = btn.dataset.tab==='quizzes'    ?'block':'none';
        document.getElementById('tab-my-results').style.display = btn.dataset.tab==='my-results' ?'block':'none';
      };
    });

    async function loadData() {
      const [qSnap,rSnap] = await Promise.all([
        getDocs(query(collection(db,'quizzes'), where('status','==','active'))),
        getDocs(query(collection(db,'results'),  where('userId','==',uid)))
      ]);
      const quizzes = qSnap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
      myResults = rSnap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>new Date(b.completedAt)-new Date(a.completedAt));

      const doneMap = {};
      myResults.forEach(r=>doneMap[r.quizId]=r);

      const avg  = myResults.length ? Math.round(myResults.reduce((s,r)=>s+(r.percentage||0),0)/myResults.length) : 0;
      const best = myResults.length ? Math.max(...myResults.map(r=>r.grade)) : 0;
      document.getElementById('s-avail').textContent = quizzes.length;
      document.getElementById('s-done').textContent  = myResults.length;
      document.getElementById('s-avg').textContent   = avg+'%';
      document.getElementById('s-best').textContent  = best>0?best+'/5':'—';

      // Quiz cards
      const grid = document.getElementById('quizzes-grid');
      if (!quizzes.length) {
        grid.innerHTML=`<div class="card empty" style="grid-column:1/-1"><div class="empty-icon">⏳</div><h3>Nema dostupnih kvizova</h3><p>Nastavnik još nije aktivirao nijedan kviz.</p></div>`;
      } else {
        grid.innerHTML = quizzes.map(q=>{
          const mr = doneMap[q.id];
          const done = !!mr;
          return `<div class="card qcard">
            <div style="display:flex;align-items:center;justify-content:space-between">
              <div class="qcard-subj">${q.subject||'Kviz'}</div>
              ${done ? gradeBadge(mr.grade,mr.gradeLabel) : '<span class="badge badge-blue">Dostupan</span>'}
            </div>
            <div class="qcard-title">${q.title}</div>
            <div class="qcard-desc">${q.description||''}</div>
            <div class="qcard-meta">
              <span>❓ ${q.numQuestions} pitanja</span>
              <span>⏱ ${q.timeLimit||30} min</span>
              <span>⚡ ${q.difficulty}</span>
            </div>
            ${done && mr ? `<div style="display:flex;flex-direction:column;gap:5px">
              <div class="prog-bar"><div class="prog-fill" style="width:${mr.percentage}%"></div></div>
              <span style="font-size:12px;color:var(--text2)">${mr.percentage}% — ${mr.gradeLabel}</span>
            </div>` : ''}
            ${done
              ? `<div class="locked-bar">🔒 Kviz je završen · <button class="btn btn-ghost btn-sm" onclick="window.location.href='/result?id=${mr.id}'">Pogledaj rezultat</button></div>`
              : `<button class="btn btn-primary btn-full" onclick="startQuiz('${q.id}')">▶ Počni kviz</button>`
            }
          </div>`;
        }).join('');
      }

      // Results table
      const rWrap = document.getElementById('my-results-wrap');
      if (!myResults.length) { rWrap.innerHTML='<p style="color:var(--text3);font-size:13.5px;padding:20px 0;text-align:center">Još niste riješili nijedan kviz</p>'; return; }
      rWrap.innerHTML = `<table class="tbl">
        <thead><tr><th>Kviz</th><th>Bodovi</th><th>%</th><th>Ocjena</th><th>Datum</th><th></th></tr></thead>
        <tbody>${myResults.map(r=>`<tr>
          <td style="color:var(--text);font-weight:500">${r.quizTitle}</td>
          <td style="font-family:var(--fm);font-size:12px">${r.earnedPoints}/${r.totalPoints}</td>
          <td style="color:${pctColor(r.percentage)};font-weight:600">${r.percentage}%</td>
          <td>${gradeBadge(r.grade,r.gradeLabel)}</td>
          <td>${fmtDate(r.completedAt)}</td>
          <td><button class="btn btn-ghost btn-sm" onclick="window.location.href='/result?id=${r.id}'">Detalji</button></td>
        </tr>`).join('')}</tbody>
      </table>`;
    }

    window.startQuiz = (id) => { window.location.href = '/take-quiz?id='+id; };
  </script>
</body>
</html>
